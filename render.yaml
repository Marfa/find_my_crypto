# Deploy API proxy on Render (free tier). See README for fmc-api-base on GitHub Pages.
# If sync leaves old build/start commands, set them in the Render dashboard:
#   Build: bundle install   Start: bundle exec ruby serve
services:
  - type: web
    name: find-my-crypto-api
    runtime: ruby
    plan: free
    buildCommand: bundle install
    startCommand: bundle exec ruby serve
    healthCheckPath: /health
